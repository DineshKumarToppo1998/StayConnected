name: Build & Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java 17 (required by AGP 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle
      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. Build APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 6. Rename APK
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/StayConnected.apk StayConnected-v${{ github.run_number }}.apk

      # 7. Create GitHub Release
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: StayConnected v1.${{ github.run_number }}
          files: StayConnected-v${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}